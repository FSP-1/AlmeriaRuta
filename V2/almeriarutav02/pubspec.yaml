name: almeriarutav02
description: "Proyecto municipal de Almería, aplicación móvil para movilidad urbana y turísticas. "
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  location_picker_flutter_map: ^4.1.0
  flutter_map_tile_caching: ^10.0.1
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: assets/app_icon/app_icon.png
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true


flutter:

  uses-material-design: true

  assets:
    - assets/app_icon/app_icon.png
